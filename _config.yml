# _config.yml
title: Harshit Jain
tagline: Associate Principal Engineer · GraphQL · Microservices · Node.js
description: >-
  Personal site and technical blog of Harshit Jain — Associate Principal Engineer
  at Nagarro, specializing in distributed systems, microservices architecture, and
  scalable GraphQL APIs.

url: "https://harshitjain.io"
baseurl: ""

github:
  username: harshitj2005

avatar: /assets/img/avatar.jpg

author:
  name: Harshit Jain
  email: Harshitj2005@gmail.com
  url: https://harshitjain.io

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

social:
  name: Harshit Jain
  email: Harshitj2005@gmail.com
  links:
    - https://linkedin.com/in/harshitj2005
    - https://github.com/harshitj2005

theme: jekyll-theme-chirpy

analytics:
  google:
    id: G-4BPQ0QLNK1

lang: en

# Timezone
timezone: America/New_York

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Collections
collections:
  tabs:
    output: true
    sort_by: order

permalink: /posts/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile.lock
  - vendor
  - README.md
