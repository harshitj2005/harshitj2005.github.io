# _config.yml
title: Harshit Jain
tagline: Senior Software Architect · GraphQL · Microservices · Node.js
description: >-
  Personal site and technical blog of Harshit Jain — Associate Principal Engineer
  at Nagarro, specializing in distributed systems, microservices architecture, and
  scalable GraphQL APIs.

url: "https://harshitj2005.github.io"
baseurl: ""

github:
  username: harshitj2005

author:
  name: Harshit Jain
  url: https://harshitj2005.github.io

social:
  name: Harshit Jain
  email: Harshitj2005@gmail.com
  links:
    - https://linkedin.com/in/harshitj2005
    - https://github.com/harshitj2005

theme: jekyll-theme-chirpy

lang: en

# Timezone
timezone: America/New_York

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Collections
collections:
  tabs:
    output: true
    sort_by: order

permalink: /posts/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile.lock
  - vendor
  - README.md
